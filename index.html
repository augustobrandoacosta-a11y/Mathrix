<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathrix Input</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        #display {
            background: rgba(0, 0, 0, 0.8);
            color: #0F0;
            border: 2px solid #0F0;
            padding: 15px;
            font-size: 24px;
            margin-bottom: 20px;
            min-height: 30px;
            border-radius: 8px;
            text-shadow: 0 0 10px #0F0;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        button {
            padding: 12px 0;
            background: #222;
            color: #eee;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.1s;
        }

        button:active { background: #0F0; color: #000; transform: translateY(2px); }
        
        .wide { grid-column: span 2; background: #333; }
        .extra-wide { grid-column: span 4; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="ui-container">
        <div id="display">_</div>
        <div class="keyboard" id="kb"></div>
    </div>

    <script>
        // --- MATRIX BACKGROUND LOGIC ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const mathSymbols = '∑π∞√∫∆θλfx=≠±≥≤∿0123456789';
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            drops.forEach((y, i) => {
                const text = mathSymbols[Math.floor(Math.random() * mathSymbols.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        // --- CUSTOM KEYBOARD LOGIC ---
        const display = document.getElementById('display');
        const kb = document.getElementById('kb');
        let currentText = "";

        // Keys: Numbers, Math, and Letters
        const keys = [
            '1','2','3','4','5','6','7','8','9','0',
            'Q','W','E','R','T','Y','U','I','O','P',
            'A','S','D','F','G','H','J','K','L', '=',
            'Z','X','C','V','B','N','M', 'π', '∑', '∞',
            '√', '∫', 'Δ', 'θ', 'f', '(', ')', '+', '-', '×'
        ];

        keys.forEach(key => {
            const btn = document.createElement('button');
            btn.innerText = key;
            btn.onclick = () => { currentText += key; updateDisplay(); };
            kb.appendChild(btn);
        });

        // Add special keys
        const space = document.createElement('button');
        space.innerText = "SPACE"; space.className = "extra-wide";
        space.onclick = () => { currentText += " "; updateDisplay(); };
        
        const back = document.createElement('button');
        back.innerText = "DEL"; back.className = "wide";
        back.onclick = () => { currentText = currentText.slice(0, -1); updateDisplay(); };

        const clear = document.createElement('button');
        clear.innerText = "CLEAR"; clear.className = "wide";
        clear.onclick = () => { currentText = ""; updateDisplay(); };

        kb.append(space, back, clear);

        function updateDisplay() {
            display.innerText = currentText + "_";
        }
    </script>
</body>
</html>
