<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathrix System</title>
    <style>
        /* Setup full-screen dark mode */
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* Matrix Background */
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        
        /* Main UI Wrapper */
        #interface {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 900px;
            margin-top: 5vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* The Output Display */
        #display {
            background: rgba(0, 15, 0, 0.85);
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 20px;
            font-size: 28px;
            min-height: 40px;
            border-radius: 5px;
            text-shadow: 0 0 8px #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            word-wrap: break-word;
        }

        /* Keyboard Container */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            background: rgba(15, 15, 15, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ff41;
        }

        /* Key Styling */
        button {
            padding: 15px 0;
            background: #111;
            color: #00ff41;
            border: 1px solid #222;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.1s ease;
            user-select: none;
        }

        button:hover {
            background: #1a1a1a;
            border-color: #00ff41;
        }

        button:active {
            background: #00ff41;
            color: #000;
            transform: scale(0.95);
        }

        /* Special Keys */
        .span-2 { grid-column: span 2; background: #1a1a1a; }
        .span-5 { grid-column: span 5; background: #0a2a0a; }
        .del-key { color: #ff3333; border-color: #551111; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="interface">
        <div id="display">_</div>
        <div class="keyboard-grid" id="keyboard"></div>
    </div>

    <script>
        // --- 1. MATRIX ENGINE ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        const symbols = "0123456789∑π∞√∫∆θλf(x)=≠±≥≤∿ABCDEFGHIKLMNOPQRSTUVWXYZ";
        const fontSize = 18;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = symbols[Math.floor(Math.random() * symbols.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // --- 2. KEYBOARD ENGINE ---
        const display = document.getElementById('display');
        const kbContainer = document.getElementById('keyboard');
        let buffer = "";

        const keyLayout = [
            '1','2','3','4','5','6','7','8','9','0',
            'Q','W','E','R','T','Y','U','I','O','P',
            'A','S','D','F','G','H','J','K','L', '=',
            'Z','X','C','V','B','N','M', 'π', '∑', '∞',
            '√', '∫', '∆', 'θ', 'λ', 'f', '(', ')', '+', '-',
            '×', '÷', '<', '>', '[', ']', '{', '}', '.', ','
        ];

        // Generate standard keys
        keyLayout.forEach(key => {
            const btn = document.createElement('button');
            btn.textContent = key;
            btn.onclick = () => addChar(key);
            kbContainer.appendChild(btn);
        });

        // Add special function keys
        const createSpecialKey = (label, classes, action) => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.className = classes;
            btn.onclick = action;
            kbContainer.appendChild(btn);
        };

        createSpecialKey("SPACE", "span-5", () => addChar(" "));
        createSpecialKey("DEL", "span-2 del-key", () => {
            buffer = buffer.slice(0, -1);
            updateDisplay();
        });
        createSpecialKey("CLEAR", "span-3 del-key", () => {
            buffer = "";
            updateDisplay();
        });

        function addChar(char) {
            buffer += char;
            updateDisplay();
        }

        function updateDisplay() {
            display.textContent = buffer + (Math.floor(Date.now() / 500) % 2 ? "_" : " ");
        }

        // Blinking cursor effect
        setInterval(updateDisplay, 500);
    </script>
</body>
</html>
